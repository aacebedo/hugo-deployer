---
name: PR

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
permissions: {}
jobs:
  prepare:
    uses: ./.github/workflows/prepare-devcontainer-image.yaml
    permissions:
      contents: read
      packages: write
  pr-checks:
    needs: prepare
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}-devcontainer:${{ github.sha }}-${{github.run_id}}
      options: --user root --privileged
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Configure git
        run: |
          git config --global --add safe.directory '*'
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Lint
        run: mise lint
      - name: Test
        run: mise test
      - name: Security scan
        run: mise security-scan
  cleanup:
    uses: ./.github/workflows/cleanup-devcontainer-image.yaml
    permissions:
      packages: write
    needs:
      - prepare
      - pr-checks
    if: always()
