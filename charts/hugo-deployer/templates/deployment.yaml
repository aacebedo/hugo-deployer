---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ .Release.Name }}'
  namespace: '{{ .Release.Namespace }}'
  annotations:
    checkov.io/skip1: "CKV_K8S_40=Application requires UID 1000 matching Dockerfile user"
    checkov.io/skip2: "CKV_K8S_43=Image digest not practical for Helm chart distribution"
    checkov.io/skip3: "CKV_K8S_35=Application requires secrets as environment variables"
spec:
  selector:
    matchLabels:
      {{- include "selectorLabels" . | nindent 6 }}
  strategy: {}
  template:
    metadata:
      labels:
        {{- include "selectorLabels" . | nindent 8 }}
      annotations:
        checksum/image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - envFrom:
          - configMapRef:
              name: '{{ .Release.Name }}-siteconfig'
          - secretRef:
              name: '{{ .Release.Name }}-siteconfig'
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag }}'
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          name: hugo-deployer
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
            initialDelaySeconds: 12
            timeoutSeconds: 5
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 80
              scheme: HTTP
          resources:
            limits:
              cpu: 1500m
              memory: 2400Mi
            requests:
              cpu: 75m
              memory: 200Mi
          ports:
            - containerPort: 80
              name: http
          {{- if and .Values.resources (gt (len .Values.resources) 0) }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /tmp
              name: tmp-volume
            - mountPath: /app/builds
              name: app-volume
              subPath: builds
            - mountPath: /app/site
              name: app-volume
              subPath: site
            - mountPath: /home/appuser
              name: user-home
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- .Values.nodeSelector | toYaml | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsConfig.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsConfig.dnsPolicy }}
      {{- end }}
      dnsConfig:
      {{- if .Values.dnsConfig.nameservers }}
        nameservers:
        {{- range .Values.dnsConfig.nameservers }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.dnsConfig.searches }}
        searches:
        {{- range .Values.dnsConfig.searches }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.dnsConfig.options }}
        options:
        {{- range .Values.dnsConfig.options }}
        - name: {{ .name | quote }}
          {{- if .value }}
          value: {{ .value | quote }}
          {{- end }}
        {{- end }}
      {{- end }}
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: app-volume
          emptyDir: {}
        - name: user-home
          emptyDir: {}

