[settings]
experimental = true

[[env]]
CGO_ENABLED = 1
MISE_GITHUB_TOKEN = { required = true, redact = true }
HELM_PLUGINS = { value = "{{ tools['http:helm-kubeconform'].path | default(value=\"\") }}", tools = true }
AUBE_TRUST_POLICY = "off"

[tools]
uv = "0.11.1"
aube = "1.15.0"
shellcheck = "0.11.0"
"pipx:podman-compose" = "1.6.0"
kube-linter = "0.8.1"
kubeconform = "0.7.0"
helm = "4.2.0"
"pipx:checkov" = "3.2.495"
editorconfig-checker = "3.6.1"
hadolint = "2.14.0"
taplo = "0.10.0"
prek = "0.4.1"
jujutsu = "0.41.0"
jjui = "0.10.5"
trivy = "0.70.0"
vale = "3.14.2"
yamllint = "1.38.0"
node = "24.16.0"
python = "3.14.2"
"npm:@prantlf/jsonlint" = "17.0.0"
"npm:renovate" = "43.150.0"

[tools."npm:semantic-release"]
version = "25.0.2"
aube_args = """
  @semantic-release/changelog@6.0.3 \
  @semantic-release/exec@7.1.0 \
  @semantic-release/git@10.0.1 \
  @semantic-release-plus/docker@3.1.3
"""

[tools."http:helm-kubeconform"]
version = "0.2.0"
url = "https://github.com/jtyr/kubeconform-helm/archive/refs/tags/v{{version}}.tar.gz"
depends = ["helm", "kubeconform"]

[vars]
repo_owner = "aacebedo"
repo_name = "hugo-deployer"
repo_url = "https://github.com/{{vars.repo_owner}}/{{vars.repo_name}}"
docker_tag = "ghcr.io/{{vars.repo_owner}}/{{vars.repo_name}}:latest"
